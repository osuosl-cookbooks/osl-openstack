---
provisioner:
  name: terraform

driver:
  name: terraform
  command_timeout: 7200

transport:
  name: rsync
  command_timeout: 7200

verifier:
  name: terraform
  systems:
    - name: controller1
      backend: ssh
      hosts_output: controller1
      user: almalinux
      profile_locations:
        - test/integration/block_storage_controller
        - test/integration/compute_controller
        - test/integration/ha_master
        - test/integration/identity
        - test/integration/image
        - test/integration/network
        - test/integration/orchestration
        - test/integration/telemetry_controller
      attrs:
        - test/integration/multi-node/controller1.yml
      sudo: true
    - name: controller2
      backend: ssh
      hosts_output: controller2
      user: almalinux
      profile_locations:
        - test/integration/block_storage_controller
        - test/integration/compute_controller
        - test/integration/ha_standby
        - test/integration/identity
        - test/integration/image
        - test/integration/network
        - test/integration/orchestration
        - test/integration/telemetry_controller
      attrs:
        - test/integration/multi-node/controller2.yml
      sudo: true
    - name: compute
      backend: ssh
      hosts_output: compute
      user: almalinux
      profile_locations:
        - test/integration/compute
        - test/integration/telemetry_compute
      attrs:
        - test/integration/multi-node/compute.yml
      sudo: true
    - name: mq1
      backend: ssh
      hosts_output: mq1
      user: almalinux
      profile_locations:
        - test/integration/messaging_tier
      attrs:
        - test/integration/multi-node/mq.yml
      sudo: true
    - name: mq2
      backend: ssh
      hosts_output: mq2
      user: almalinux
      profile_locations:
        - test/integration/messaging_tier
      attrs:
        - test/integration/multi-node/mq.yml
      sudo: true
    - name: mq3
      backend: ssh
      hosts_output: mq3
      user: almalinux
      profile_locations:
        - test/integration/messaging_tier
      attrs:
        - test/integration/multi-node/mq.yml
      sudo: true
<% if ENV['TF_VAR_region2'] == '1' %>
    - name: controller_region2
      backend: ssh
      hosts_output: controller_region2
      user: almalinux
      profile_locations:
        - test/integration/compute_controller
        - test/integration/image
        - test/integration/network
        - test/integration/ops_messaging
      attrs:
        - test/integration/multi-node/controller_region2.yml
      sudo: true
    - name: compute_region3
      backend: ssh
      hosts_output: compute_region2
      user: almalinux
      profile_locations:
        - test/integration/compute
        - test/integration/telemetry_compute
      attrs:
        - test/integration/multi-node/compute_region2.yml
      sudo: true
<% end %>

platforms:
  - name: almalinux-8
    driver:
      variables:
        os_image: "AlmaLinux 8"
        ssh_user_name: "almalinux"
  - name: almalinux-9
    driver:
      variables:
        os_image: "AlmaLinux 9"
        ssh_user_name: "almalinux"

suites:
  - name: multi-node
