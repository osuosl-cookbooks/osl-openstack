db_endpoint: db.testing.osuosl.org
physical_interface_mappings: public:eth1.42
prometheus_endpoint: controller.testing.osuosl.org
# RabbitMQ moved to the mq tier (mq1, TLS 5671); memcached stays on the
# controllers.
messaging_host: mq1.testing.osuosl.org
messaging_port: 5671
memcached_host: controller1.testing.osuosl.org
skip_ssl_baseline: true
# haproxy on the VIP terminates TLS; Apache serves plain HTTP on the
# per-host backend IP and nova-novncproxy runs without --ssl_only.
haproxy_tls: true
# controller2's bootstrap intentionally omits the one-time
# image_upload, create_flavor, create_network, and prometheus exporter
# recipes - those run only on the primary controller. Skip the
# corresponding InSpec checks so this controller doesn't fail them.
primary_controller: false
